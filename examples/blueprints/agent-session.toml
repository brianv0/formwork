# Sandbox for an interactive coding agent (Claude Code / codex / opencode) launched under
# `formwork run`. The kernel — not the agent's own permission prompts — is the wall, which is what
# makes it safe to hand the agent its "skip every prompt" flag (see each host's README).
#
# This is profiles/default.toml narrowed to one project. `~` expands against $HOME when the CLI
# loads the blueprint; narrowing a grant is always safe, widening is not (FW-CAP2).
#
#   reads   the whole ambient environment MINUS a sensitive set (keys, cloud creds, keychains,
#           browser profiles). The canonical superset lives in profiles/sensitive-set.toml.
#   writes  one project tree + scratch. Point this at your repo.
#   net     HTTPS egress only, so the agent still reaches its model API. This is port-scoped, not
#           host-scoped: formwork does not (yet) allowlist egress by host, so treat :443 as "any
#           HTTPS host". The fs sandbox is what stops secrets being read to exfiltrate at all.
#   exec    unrestricted, so the agent runs tools freely; set an allowlist to restrict execve.

net = { ports = [443] }
exec = "unrestricted"

[fs]
read-mode = "ambient-minus-subtract"
reads = ["/**"]
# project + scratch + this agent's own state dir, so Claude can persist history/settings/auth.
writes = ["~/project/**", "~/.claude/**", "/tmp/**", "/private/tmp/**", "/var/tmp/**"]
subtract = [
    # SSH / GPG / cloud + CI credentials
    "~/.ssh/**",
    "~/.gnupg/**",
    "~/.aws/**",
    "~/.config/gcloud/**",
    "~/.azure/**",
    "~/.kube/**",
    "~/.docker/**",   # whole dir incl. run/docker.sock (host-root); no agent needs it
    "~/.netrc",
    "~/.npmrc",
    "~/.pypirc",
    "~/.config/gh/**",
    "~/.git-credentials",
    # other agents' state: deny so this confined Claude can't read Codex/Gemini/Cursor creds.
    # ~/.claude is intentionally NOT subtracted -- it's this agent's own config/session.
    "~/.codex/**",
    "~/.gemini/**",
    "~/.cursor/**",
    # project-local secrets at any depth (a repo .env usually holds API keys)
    "**/.env",
    # keychains (macOS)
    "~/Library/Keychains/**",
    "/Library/Keychains/**",
    # browser profiles
    "~/Library/Application Support/Google/Chrome/**",
    "~/Library/Application Support/Firefox/**",
    "~/.config/google-chrome/**",
    "~/.mozilla/**",
    # system credential stores
    "/etc/shadow",
    "/etc/sudoers",
    "/etc/sudoers.d/**",
]
# Tamper vectors: write-denied but readable, so the agent can't plant a git hook / .mcp.json / IDE
# task that later runs unsandboxed, yet git and tooling still read them (FW-TRA7).
write-subtract = [
    "**/.git/hooks/**",
    "**/.git/config",
    "**/.mcp.json",
    "**/.vscode/**",
    "**/.idea/**",
]
