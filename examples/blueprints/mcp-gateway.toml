# Blueprint for `formwork gateway`. One blueprint governs both surfaces the gateway controls:
#
#   [mcp.files]   shades the MCP protocol — only `read_file` is visible and callable; every other
#                 tool (write_file, http_fetch), plus all resources and prompts, is absent from
#                 listings and non-invocable. A hidden-but-real name and a nonexistent one get the
#                 same refusal, so the shading is not an oracle.
#
#   fs / net      confine the spawned backend process itself: the server runs behind the
#                 same wall, so even a compromised or over-eager backend cannot read outside its
#                 grant or open the network.
#
# The demo backend is the repo's built-in fixture (crates/formwork-gateway, bin fw-mcp-fixture), so
# `examples/gateway-demo.sh` runs with no external dependencies. For a real server, keep this shape
# and swap the backend command — see each host's config file — then narrow reads/writes to the tree
# that server should see and set net to only what it needs.

net = "deny"

[fs]
read-mode = "ambient-minus-subtract"
reads = ["/**"]
writes = []

[mcp.files]
tools = { allow = ["read_file"] }
resources = "deny"
prompts = "deny"

# Pattern shading. Every axis accepts exact names OR anchored regex written `/…/` (matched
# against the whole identifier), plus a terminal `deny` that always wins over `allow` -- the same
# deny-terminal bias as the filesystem rules, here over tool/resource/prompt names. This is a
# userspace match in the gateway, not a kernel path rule, so a real regex is sound where a general
# filesystem glob is not. Illustrative (front a real server by swapping the backend command):
#
#   [mcp.github]
#   # allow the read-only surface, but never the destructive tools -- deny beats the allow overlap:
#   tools = { allow = ["/^(get|list|search)_.*/"], deny = ["/^delete_.*/", "merge_pull_request"] }
#
#   [mcp.everything]
#   # expose everything the server offers EXCEPT anything that can sample the model or print env:
#   tools = { deny = ["/^sample.*/", "printEnv"] }   # omitting `allow` means "all"
