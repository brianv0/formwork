# The credential-location catalog (FW-CRED1): the typed, versioned successor to the informal
# sensitive set (FW-TRA3, superseded by FEP-2 §11). Locations only -- paths and environment
# variable names -- never content signatures. The whole catalog is denied/stripped by default
# (FW-CRED4); the only lift is the explicit typed exclude, `allow-credentials = ["<type>"]` /
# `--allow-cred <type>` (FW-CRED5). Discovery can never propose a grant that matches this file
# (FW-DISC3 / FW-INV8).
#
# Embedded into `formwork-blueprint` at build time (`include_str!`) so the pure compiler needs no
# I/O; `~` expands against the launcher's $HOME at the CLI edge. Two location kinds, two arms
# (FW-CRED2): `paths` -> the OS confiner (EACCES); `envs` -> the launcher (variable absent).
# `env-file-refs` names env vars whose *value* is a file path: excluding the type strips the var
# AND denies the referenced file (FW-CRED3).

version = 1

# --- cloud / CI credentials -------------------------------------------------------------------

[types.aws]
paths = ["~/.aws/**"]
envs = ["AWS_ACCESS_KEY_ID", "AWS_SECRET_ACCESS_KEY", "AWS_SESSION_TOKEN"]

[types.gcp]
paths = ["~/.config/gcloud/**"]
envs = ["GOOGLE_APPLICATION_CREDENTIALS"]
env-file-refs = ["GOOGLE_APPLICATION_CREDENTIALS"]

[types.azure]
paths = ["~/.azure/**"]
envs = ["AZURE_CLIENT_SECRET"]

[types.kube]
paths = ["~/.kube/**"]
envs = ["KUBECONFIG"]
env-file-refs = ["KUBECONFIG"]

[types.docker]
# The whole dir: ~/.docker/run/docker.sock is host-root (FW-TRA8).
paths = ["~/.docker/**"]

# --- keys and key stores ----------------------------------------------------------------------

[types.ssh]
paths = ["~/.ssh/**"]

[types.gpg]
paths = ["~/.gnupg/**"]

[types.keychain]
paths = ["~/Library/Keychains/**", "/Library/Keychains/**"]

# --- forges / registries ----------------------------------------------------------------------

[types.github]
paths = ["~/.config/gh/**", "~/.git-credentials"]
envs = ["GITHUB_TOKEN", "GH_TOKEN"]

[types.netrc]
paths = ["~/.netrc"]

[types.npm]
paths = ["~/.npmrc"]
envs = ["NPM_TOKEN", "NODE_AUTH_TOKEN"]

[types.cargo]
# The publish token only -- ~/.cargo/** itself stays usable (registry caches are the ambient
# toolchain, FW-TRA1).
paths = ["~/.cargo/credentials.toml", "~/.cargo/credentials"]
envs = ["CARGO_REGISTRY_TOKEN"]

[types.pypi]
paths = ["~/.pypirc"]
envs = ["TWINE_PASSWORD"]

# --- model / SaaS APIs ------------------------------------------------------------------------

[types.anthropic]
paths = ["~/.anthropic/**"]
envs = ["ANTHROPIC_API_KEY"]

[types.openai]
envs = ["OPENAI_API_KEY"]

[types.slack]
envs = ["SLACK_BOT_TOKEN", "SLACK_TOKEN"]

# --- agent-tool state: OAuth creds, API keys, transcripts (FW-TRA8) ----------------------------
# One confined agent must not read another's secrets. A launcher that runs a *specific* agent
# excludes that agent's own type (e.g. `--allow-cred claude` under Claude Code).

[types.claude]
paths = ["~/.claude/**", "~/.claude.json"]

[types.codex]
paths = ["~/.codex/**"]

[types.gemini]
paths = ["~/.gemini/**"]

[types.cursor]
paths = ["~/.cursor/**"]

# --- browser profiles (session cookies are credentials) ----------------------------------------

[types.browser]
paths = [
    "~/Library/Application Support/Google/Chrome/**",
    "~/Library/Application Support/Firefox/**",
    "~/.config/google-chrome/**",
    "~/.mozilla/**",
]

# --- system credential stores -----------------------------------------------------------------

[types.system]
paths = ["/etc/shadow", "/etc/sudoers", "/etc/sudoers.d/**"]

# --- project-local secrets at any depth (FW-CAP6 `**/` form, FW-TRA8) --------------------------

[types.dotenv]
paths = ["**/.env"]

# --- generic backstop (FW-CRED6) ---------------------------------------------------------------
# Sensible-shaped secrets with no curated type stay covered: `.env` variants and files literally
# named like credentials or SSH private keys, at any depth. Liftable only as the whole named
# pseudo-type `backstop` (coarse on purpose; prefer narrowing a real type).

[backstop]
paths = [
    "**/.env.local",
    "**/.env.development",
    "**/.env.test",
    "**/.env.staging",
    "**/.env.production",
    "**/credentials",
    "**/credentials.json",
    "**/.netrc",
    "**/id_rsa",
    "**/id_ecdsa",
    "**/id_ed25519",
]
