# TEMPORARY -- flake reproduction harness for the FW-E2E-064 macOS log-persistence race.
# Not part of the normal CI matrix; triggers only on this investigation branch (and manual
# dispatch). Delete before merge. It runs a controlled A/B on ONE macOS runner under identical
# background load: the same learn E2E is stressed N times against the FIXED binary, then again
# with learn.rs reverted to the pre-fix commit (single settle floor). If the fix works, the OLD
# column shows intermittent failures and the FIXED column shows none.
name: flake-repro (temporary)

on:
  push:
    branches: [claude/test-flake-fold-credential-4wla8r]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ITERATIONS: "30"
  # The single test that flakes (FW-ADV-015); runs against the real Seatbelt + `log show` feed
  # on macOS (no `macos` marker, so it is not skipped here).
  TARGET: "harness/test_discovery.py::test_fold_does_not_transitively_grant_a_non_home_credential"

jobs:
  stress:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the parent commit to revert learn.rs for the A/B

      - name: Install Rust (stable)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Install uv
        run: pipx install uv

      - name: Sync harness deps
        working-directory: py
        run: uv sync

      # Saturate every core for the duration of the run: the flake needs a *loaded* Mac, where the
      # log daemon is contended and a short-lived process's buffered Sandbox denial takes longer to
      # persist to the store `log show` reads. A quiet runner may not reproduce it at all.
      - name: Start background CPU load
        run: |
          cores=$(sysctl -n hw.ncpu)
          echo "saturating $cores cores"
          for _ in $(seq 1 "$cores"); do yes > /dev/null & done
          echo "LOAD_PIDS=$(jobs -p | tr '\n' ' ')" >> "$GITHUB_ENV"

      - name: Build FIXED binary
        run: cargo build -q -p formwork-cli --locked

      - name: Stress FIXED (two settle floors)
        working-directory: py
        run: |
          fails=0
          for i in $(seq 1 "$ITERATIONS"); do
            if uv run pytest -q "$TARGET" > "/tmp/fixed-$i.log" 2>&1; then
              printf 'F%02d ok  ' "$i"
            else
              fails=$((fails+1)); printf 'F%02d FAIL' "$i"
              tail -n 20 "/tmp/fixed-$i.log" | sed 's/^/    | /'
            fi
            [ $((i % 5)) -eq 0 ] && echo
          done
          echo
          echo "FIXED_FAILS=$fails" >> "$GITHUB_ENV"
          echo "==> FIXED: $fails / $ITERATIONS failed"

      - name: Revert learn.rs to the pre-fix commit (single floor)
        run: |
          git show HEAD~1:crates/formwork-cli/src/learn.rs > crates/formwork-cli/src/learn.rs
          echo "reverted learn.rs to $(git rev-parse --short HEAD~1)"
          cargo build -q -p formwork-cli

      - name: Stress OLD (single settle floor)
        working-directory: py
        run: |
          fails=0
          for i in $(seq 1 "$ITERATIONS"); do
            if uv run pytest -q "$TARGET" > "/tmp/old-$i.log" 2>&1; then
              printf 'O%02d ok  ' "$i"
            else
              fails=$((fails+1)); printf 'O%02d FAIL' "$i"
              tail -n 20 "/tmp/old-$i.log" | sed 's/^/    | /'
            fi
            [ $((i % 5)) -eq 0 ] && echo
          done
          echo
          echo "==> OLD:   $fails / $ITERATIONS failed"
          echo "==> FIXED was $FIXED_FAILS / $ITERATIONS (same runner, same load)"

      - name: Stop background load
        if: always()
        run: kill $LOAD_PIDS 2>/dev/null || true

      - name: Verdict
        run: |
          echo "FIXED failures: ${FIXED_FAILS:-?} / $ITERATIONS"
          echo "See the two stress steps above for the OLD count."
          echo "Reproduction is demonstrated when OLD > 0 and FIXED == 0."
          echo "OLD == 0 too means the runner stayed too quiet to trip the race (inconclusive)."
