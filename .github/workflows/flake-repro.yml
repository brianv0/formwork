# TEMPORARY -- flake reproduction harness for the FW-E2E-064 macOS log-persistence race.
# Not part of the normal CI matrix; triggers only on this investigation branch (and manual
# dispatch). Delete before merge.
#
# Controlled A/B on ONE macos-14 runner under identical MODERATE load (ncpu-1 cores saturated,
# leaving one free -- 3-core saturation pushes log persistence past any fixed floor and measures
# nothing). Each version is selected by EXPLICIT SHA (not HEAD~N, which shifts as commits are
# added -- the bug in run 1), so the arms are unambiguous:
#   FIXED    = 3c392b4  (two settle floors: empty windows held to 15s)
#   BASELINE = 57f98bb  (single 6s floor -- pre-fix)
# Each is stressed N times against the real Seatbelt + `log show` feed (no `macos` marker, so the
# test is not skipped). Every iteration is timed; failures dump the CLI stderr (look for withheld=0).
name: flake-repro (temporary)

on:
  push:
    branches: [claude/test-flake-fold-credential-4wla8r]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ITERATIONS: "40"
  FIXED_SHA: "3c392b4"
  BASELINE_SHA: "57f98bb"
  TARGET: "harness/test_discovery.py::test_fold_does_not_transitively_grant_a_non_home_credential"

jobs:
  stress:
    runs-on: macos-14
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need both SHAs present

      - name: Install Rust (stable)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Install uv
        run: pipx install uv

      - name: Sync harness deps
        working-directory: py
        run: uv sync

      # Moderate load: saturate all-but-one core so the log daemon is contended and a short-lived
      # process's buffered Sandbox denial persists slowly -- but not so hard that latency always
      # exceeds 15s (which would sink both arms and measure nothing).
      - name: Start background CPU load (ncpu-1 cores)
        run: |
          cores=$(sysctl -n hw.ncpu)
          load=$(( cores > 1 ? cores - 1 : 1 ))
          echo "cores=$cores, saturating $load"
          for _ in $(seq 1 "$load"); do yes > /dev/null & done
          echo "LOAD_PIDS=$(jobs -p | tr '\n' ' ')" >> "$GITHUB_ENV"

      # A reusable stress loop: $1 = SHA to test, $2 = label. Writes "<label>_FAILS=<n>" to GITHUB_ENV.
      - name: Stress FIXED (3c392b4, two settle floors)
        working-directory: py
        run: |
          git -C .. checkout "$FIXED_SHA" -- crates/formwork-cli/src/learn.rs
          cargo build -q -p formwork-cli --locked --manifest-path ../Cargo.toml
          fails=0
          for i in $(seq 1 "$ITERATIONS"); do
            start=$SECONDS
            if uv run pytest -q "$TARGET" > "/tmp/fixed-$i.log" 2>&1; then
              printf 'F%02d ok %2ds | ' "$i" "$((SECONDS-start))"
            else
              fails=$((fails+1)); printf 'F%02d FAIL %2ds\n' "$i" "$((SECONDS-start))"
              grep -E "withheld=|1 failed|AssertionError" "/tmp/fixed-$i.log" | head -3 | sed 's/^/    | /'
            fi
            [ $((i % 5)) -eq 0 ] && echo
          done
          echo; echo "==> FIXED: $fails / $ITERATIONS failed"
          echo "FIXED_FAILS=$fails" >> "$GITHUB_ENV"

      - name: Stress BASELINE (57f98bb, single 6s floor)
        working-directory: py
        run: |
          git -C .. checkout "$BASELINE_SHA" -- crates/formwork-cli/src/learn.rs
          cargo build -q -p formwork-cli --locked --manifest-path ../Cargo.toml
          fails=0
          for i in $(seq 1 "$ITERATIONS"); do
            start=$SECONDS
            if uv run pytest -q "$TARGET" > "/tmp/base-$i.log" 2>&1; then
              printf 'B%02d ok %2ds | ' "$i" "$((SECONDS-start))"
            else
              fails=$((fails+1)); printf 'B%02d FAIL %2ds\n' "$i" "$((SECONDS-start))"
              grep -E "withheld=|1 failed|AssertionError" "/tmp/base-$i.log" | head -3 | sed 's/^/    | /'
            fi
            [ $((i % 5)) -eq 0 ] && echo
          done
          echo; echo "==> BASELINE: $fails / $ITERATIONS failed"
          echo "BASELINE_FAILS=$fails" >> "$GITHUB_ENV"

      - name: Stop background load
        if: always()
        run: kill $LOAD_PIDS 2>/dev/null || true

      - name: Verdict
        run: |
          echo "===================== flake-repro verdict ====================="
          echo "FIXED    (3c392b4, empty floor 15s): $FIXED_FAILS / $ITERATIONS failed"
          echo "BASELINE (57f98bb, single floor 6s): $BASELINE_FAILS / $ITERATIONS failed"
          echo "Fix is demonstrated when BASELINE > FIXED (fewer empty proposals with the longer empty floor)."
          echo "If BASELINE == FIXED == 0, the load was too light to trip the race (raise load/iterations)."
          echo "If both are high and equal, latency exceeded 15s (load too heavy, or 15s is insufficient)."
