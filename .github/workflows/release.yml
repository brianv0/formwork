# Release binaries for the four supported host targets: macOS and Linux, on arm64 and x86_64.
#
# Three triggers, three behaviors:
#   * Version tag push (git tag v0.1.0 && git push origin v0.1.0) -> versioned GitHub Release.
#   * Push to main -> rolling `canary` prerelease, updated in place so every merge to main has
#     downloadable binaries at stable URLs:
#       https://github.com/brianv0/formwork/releases/download/canary/formwork-canary-<target>.tar.gz
#   * `workflow_dispatch` builds the same matrix without publishing, so the release path can be
#     dry-run from the Actions tab before cutting a real tag.
#
# Every target builds natively on matching hardware — no cross-compilation:
#   * macos-14 (Apple Silicon) -> aarch64-apple-darwin ; macos-15-intel -> x86_64-apple-darwin
#     (macos-13, the previous Intel image, was retired 2025-12-04; macos-15-intel is GitHub's last
#     x86_64 macOS image, available until August 2027 — revisit the Intel slice before then).
#   * ubuntu-22.04 (x86_64) and ubuntu-22.04-arm (arm64) build the two Linux slices.
# Both Linux runners are 22.04 for a glibc 2.35 floor (widest downstream compatibility); 24.04 would
# raise the required glibc. Native arm64 Linux runners are free on public repos and billed on private.
# Only first-party actions/* and the preinstalled `gh` CLI are used (no third-party release actions).
#
# macOS signing + notarization (Gatekeeper): when the three secrets below are configured, the two
# macOS slices are Developer-ID-signed with the hardened runtime and notarized via `rcodesign`
# (the pure-Rust `apple-codesign` crate, pinned and built from crates.io -- no Xcode, no third-party
# action). Without the secrets every signing step skips and the binaries ship unsigned, as before.
# A bare Mach-O cannot carry a stapled ticket, so Gatekeeper fetches it online on first run -- the
# normal arrangement for CLI tools. To mint the secrets:
#   * MACOS_SIGN_P12_BASE64   -- Keychain Access -> export your "Developer ID Application" identity
#                                as .p12, then `base64 < cert.p12`.
#   * MACOS_SIGN_P12_PASSWORD -- the password chosen at export.
#   * MACOS_NOTARY_API_KEY_JSON -- App Store Connect -> Integrations -> API key (Developer role),
#                                then `rcodesign encode-app-store-connect-api-key <issuer-id>
#                                <key-id> AuthKey_<key-id>.p8` and paste the JSON.
name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

# Never cancel an in-flight release for the same tag mid-publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      # Empty when the repo secrets are unset; every signing step keys off that and skips.
      MACOS_SIGN_P12_BASE64: ${{ secrets.MACOS_SIGN_P12_BASE64 }}
      MACOS_SIGN_P12_PASSWORD: ${{ secrets.MACOS_SIGN_P12_PASSWORD }}
      MACOS_NOTARY_API_KEY_JSON: ${{ secrets.MACOS_NOTARY_API_KEY_JSON }}
      RCODESIGN_VERSION: "0.29.0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + target
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: release-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        env:
          # Floor macOS support so binaries run on older releases; harmless on the Linux runners.
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: cargo build --release --locked --target ${{ matrix.target }} -p formwork-cli --bin formwork

      # ---- macOS Developer ID signing + notarization; every step skips unless the secrets exist.

      - name: Restore rcodesign
        id: rcodesign-cache
        if: contains(matrix.target, 'apple-darwin') && env.MACOS_SIGN_P12_BASE64 != ''
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/rcodesign
          key: rcodesign-${{ matrix.target }}-${{ env.RCODESIGN_VERSION }}

      - name: Install rcodesign
        if: |
          contains(matrix.target, 'apple-darwin') && env.MACOS_SIGN_P12_BASE64 != ''
            && steps.rcodesign-cache.outputs.cache-hit != 'true'
        run: cargo install apple-codesign --version "$RCODESIGN_VERSION" --locked

      - name: Sign (Developer ID, hardened runtime)
        if: contains(matrix.target, 'apple-darwin') && env.MACOS_SIGN_P12_BASE64 != ''
        run: |
          set -euo pipefail
          printf '%s' "$MACOS_SIGN_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dev-id.p12"
          printf '%s' "$MACOS_SIGN_P12_PASSWORD" > "$RUNNER_TEMP/dev-id.pass"
          rcodesign sign \
            --p12-file "$RUNNER_TEMP/dev-id.p12" \
            --p12-password-file "$RUNNER_TEMP/dev-id.pass" \
            --code-signature-flags runtime \
            "target/${{ matrix.target }}/release/formwork"
          rm -f "$RUNNER_TEMP/dev-id.p12" "$RUNNER_TEMP/dev-id.pass"
          # The runner's native toolchain independently checks what rcodesign produced.
          codesign --verify --strict --verbose=2 "target/${{ matrix.target }}/release/formwork"

      - name: Notarize
        if: contains(matrix.target, 'apple-darwin') && env.MACOS_SIGN_P12_BASE64 != '' && env.MACOS_NOTARY_API_KEY_JSON != ''
        run: |
          set -euo pipefail
          printf '%s' "$MACOS_NOTARY_API_KEY_JSON" > "$RUNNER_TEMP/notary-key.json"
          # Apple's notary service takes zips, not bare Mach-Os. The ticket attaches to the binary's
          # code signature server-side; nothing is stapled, so this zip is submit-and-discard.
          zip -j "$RUNNER_TEMP/notarize.zip" "target/${{ matrix.target }}/release/formwork"
          rcodesign notary-submit \
            --api-key-file "$RUNNER_TEMP/notary-key.json" \
            --max-wait-seconds 900 \
            --wait "$RUNNER_TEMP/notarize.zip"
          rm -f "$RUNNER_TEMP/notary-key.json"

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          # Tag builds are named after the tag; main pushes (and dispatch dry-runs) after the
          # rolling `canary` release, so its download URLs stay stable across merges.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            label="${GITHUB_REF_NAME}"
          else
            label="canary"
          fi
          name="formwork-${label}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/formwork" "$staging/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging/"
          tar -C dist -czf "${name}.tar.gz" "${name}"
          echo "asset=${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    # Publish for real tag pushes and for merges to main (rolling `canary` prerelease);
    # workflow_dispatch stops after building.
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: (cd dist && sha256sum *.tar.gz > SHA256SUMS)

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
            # Idempotent: create the release on first run, re-upload assets on a re-run.
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release upload "$tag" dist/*.tar.gz dist/SHA256SUMS --clobber
            else
              gh release create "$tag" --verify-tag --generate-notes \
                dist/*.tar.gz dist/SHA256SUMS
            fi
          else
            # Merge to main: upsert the rolling `canary` prerelease in place. Force-move the tag
            # to this commit first so the release's source snapshot matches its binaries.
            tag="canary"
            if ! gh api "repos/${GH_REPO}/git/refs/tags/${tag}" \
                   -X PATCH -f sha="${GITHUB_SHA}" -F force=true >/dev/null 2>&1; then
              gh api "repos/${GH_REPO}/git/refs" \
                -f ref="refs/tags/${tag}" -f sha="${GITHUB_SHA}" >/dev/null
            fi
            notes="Rolling build of the latest \`main\` (${GITHUB_SHA}). Not a stable release."
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release upload "$tag" dist/*.tar.gz dist/SHA256SUMS --clobber
              gh release edit "$tag" --prerelease --title "canary (latest main)" --notes "$notes"
            else
              gh release create "$tag" --prerelease --title "canary (latest main)" --notes "$notes" \
                dist/*.tar.gz dist/SHA256SUMS
            fi
          fi
