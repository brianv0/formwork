# Continuous integration: format, lint, and test the workspace on every push to main and every PR.
# Uses only first-party `actions/*` and the runner's preinstalled rustup — no third-party actions,
# to keep the supply-chain surface of a sandboxing tool minimal (constitution: enforcement is real,
# not assumed). Release artifacts are built separately in release.yml.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the repo.
permissions:
  contents: read

# One in-flight run per ref; a newer push supersedes an older, still-running one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt + clippy)
        run: |
          rustup toolchain install stable --profile minimal \
            --component rustfmt --component clippy --no-self-update
          rustup default stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: lint-${{ runner.os }}-cargo-

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Native OS backends differ (Seatbelt on macOS; Landlock/seccomp stub on Linux), so the
        # suite must run on both. Integration tests that need a real kernel mechanism are cfg-gated
        # to their OS AND to the kernel's Landlock ABI, so a stock runner exercises exactly what it
        # can enforce. Two Linux runners on purpose: ubuntu-22.04 is kernel 5.15 (Landlock ABI v1,
        # no net) -- the degraded host FW-E2E-025 needs; ubuntu-24.04 is kernel 6.8+ (ABI v4+, net)
        # -- the capable host FW-E2E-009's port-tier enforcement needs. Landlock ABI is a property of
        # the runner's kernel, not the container image (containers share the host kernel), so this is
        # how you get "an older/newer kernel" in CI. Each net test skips cleanly off its ABI tier.
        os: [ubuntu-22.04, ubuntu-24.04, macos-14]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: test-${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --workspace --locked

      # Surfaces the runner's real enforcement profile (Landlock ABI, seccomp, backend) in the log,
      # so the ABI-gated net tests' skip/run decisions are visible and verifiable -- e.g. confirming
      # ubuntu-24.04 reports landlock_abi >= 4 (net) and ubuntu-22.04 reports v1 (degraded).
      - name: Host capability profile
        run: cargo run -q -p formwork-cli --locked -- detect

      - name: Test
        run: cargo test --workspace --locked
