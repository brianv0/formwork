# Continuous integration: format, lint, and test the workspace on every push to main and every PR.
# Uses only first-party `actions/*` and the runner's preinstalled rustup — no third-party actions,
# to keep the supply-chain surface of a sandboxing tool minimal (constitution: enforcement is real,
# not assumed). Release artifacts are built separately in release.yml.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the repo.
permissions:
  contents: read

# One in-flight run per ref; a newer push supersedes an older, still-running one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt + clippy)
        run: |
          rustup toolchain install stable --profile minimal \
            --component rustfmt --component clippy --no-self-update
          rustup default stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: lint-${{ runner.os }}-cargo-

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Native OS backends differ (Seatbelt on macOS; Landlock/seccomp on Linux), so the
        # suite must run on both. Integration tests that need a real kernel mechanism are cfg-gated
        # to their OS, so a stock runner exercises exactly what it can enforce. Each job carries
        # its learn-usefulness probe against its real feed: macOS FW-E2E-064 (a millisecond
        # workload's denial must survive unified-log persistence latency) via Seatbelt +
        # `log show`; Linux FW-E2E-071 (the same millisecond shape) via Landlock + the strace
        # ptrace feed.
        os: [ubuntu-22.04, macos-14]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      # The Linux learn feed (FW-E2E-071) traces the workload with strace; installing it here is
      # what lets the ubuntu job EXECUTE the ptrace-feed tests instead of skipping them -- a
      # platform-marked test that never runs on its platform is a claim, not a verification.
      - name: Install strace (Linux denial feed)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y strace

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: test-${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      # The Python black-box harness drives the built `formwork` binary at the outermost real
      # boundary; platform-inappropriate tests skip via markers (macOS Seatbelt vs Linux Landlock),
      # so each OS runs exactly what it can enforce. `uv` comes via the runner's preinstalled `pipx`
      # (not a third-party action), matching the Dockerfile's uv-managed harness.
      - name: Install uv
        run: pipx install uv

      - name: Python E2E harness
        working-directory: py
        run: uv run pytest -q

  # Integration test of MCP pattern shading (FW-GW9/FW-E2E-068) against a real, published MCP
  # server. Kept a separate Linux job because it pulls a pinned npm package at test time (network),
  # which the hermetic unit/integration suite above deliberately does not. The runner ships node, so
  # no third-party action is added (constitution: minimal supply-chain surface for a sandbox tool).
  mcp-integration:
    name: mcp-integration (real server)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: mcp-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: mcp-${{ runner.os }}-cargo-

      - name: Show node version (preinstalled on the runner)
        run: node --version && npx --version

      # `--ignored` runs exactly the network-dependent real-server test; it fetches the pinned
      # @modelcontextprotocol/server-everything and drives it through the gateway with a regex policy.
      - name: Regex shading against a real MCP server
        run: cargo test -p formwork-gateway --test real_server --locked -- --ignored --nocapture
