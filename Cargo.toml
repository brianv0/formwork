[workspace]
resolver = "2"
members = [
    "crates/formwork-spec",
    "crates/formwork-detect",
    "crates/formwork-compile",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/brianv0/formwork"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
thiserror = "2"

formwork-spec = { path = "crates/formwork-spec" }
formwork-detect = { path = "crates/formwork-detect" }

[profile.release]
lto = "thin"
